<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/myaccount.css">
</head>
<body>
    <header>
          <nav class="navbar" id="navbar">
    <a href="../index.html" class="logo" id="logo" >Car<span>Rental</span></a>
    <div class="nav-links" id="navLinks">
      <a href="./myaccount.html" id="myAccount">My Account</a>
      <a href="./favourites.html" id="favourites">❤️ Favorites</a>
         <a href="./addcar.html" id="addCar">+ Add Car</a>
         <a href="./mycar.html" id="myCars">My Cars</a>
      <a href="./register.html" id="register">Registration</a>
      <a href="./login.html" id="logIn">Log In</a>
      <a href="" id="logOut">Log Out</a>
    </div>
  </nav>
    </header>

    <div class="registration-container">
        <div class="registration-card">
            <h2>My Account</h2>


            <div id="userInfo"></div>

          
            <div class="messages-section">
                <button id="messagesToggle">✉️ Messages ▾</button>
                <div id="messagesDropdown" class="messages-dropdown hidden">
                    <button id="inboxBtn">📥 Inbox</button>
                    <button id="newMessageBtn">✉️ + New Message</button>

                  
                    <div id="inboxSection" class="hidden">
                        <div id="messagesList"></div>
                    </div>

                   
                    <div id="newMessageSection" class="hidden">
                         <input id="msgPhoneNumber" type="text" placeholder="Phone Number" />
                        <input id="msgCarId" type="number" placeholder="Car ID" />
                        <textarea id="msgText" placeholder="Write your message..."></textarea>
                        <button id="sendMessageBtn">Send</button>
                    </div>
                </div>
            </div>
            <div class="rentals-section">
  <h3>🚗 My Rentals</h3>
  <div id="rentalsList"></div>
</div>

        </div>
    </div>

    <script src="../apps/myaccount.js"></script>
</body>
</html>
